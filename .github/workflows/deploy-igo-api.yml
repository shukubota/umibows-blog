name: Deploy Igo API to Cloud Run

on:
  push:
    branches: [main]
    paths:
      - "cloud-run/igo-api/**"
      - "hooks/go/**"
      - "public/models/**"
  workflow_dispatch:

env:
  REGION: asia-northeast1
  SERVICE: igo-api
  REGISTRY: asia-northeast1-docker.pkg.dev

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: github-actions@${{ secrets.GCP_PROJECT_ID }}.iam.gserviceaccount.com
          token_format: "access_token"

      - uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker
        run: echo "${{ steps.auth.outputs.access_token }}" | docker login -u oauth2accesstoken --password-stdin https://${{ env.REGISTRY }}

      - name: Build & Push image
        run: |
          IMAGE=${{ env.REGISTRY }}/${{ secrets.GCP_PROJECT_ID }}/${{ env.SERVICE }}/${{ env.SERVICE }}
          docker build \
            -f cloud-run/igo-api/Dockerfile \
            -t ${IMAGE}:${{ github.sha }} \
            -t ${IMAGE}:latest \
            .
          docker push ${IMAGE}:${{ github.sha }}
          docker push ${IMAGE}:latest
          echo "IMAGE=${IMAGE}:${{ github.sha }}" >> $GITHUB_ENV

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy ${{ env.SERVICE }} \
            --image ${{ env.IMAGE }} \
            --region ${{ env.REGION }} \
            --platform managed \
            --allow-unauthenticated \
            --memory 1Gi \
            --cpu 1 \
            --concurrency 4 \
            --min-instances 0 \
            --max-instances 3 \
            --timeout 60s \
            --project ${{ secrets.GCP_PROJECT_ID }}

      - name: Show service URL
        run: |
          gcloud run services describe ${{ env.SERVICE }} \
            --region ${{ env.REGION }} \
            --project ${{ secrets.GCP_PROJECT_ID }} \
            --format "value(status.url)"
