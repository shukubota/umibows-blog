<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="light dark" />
    <title>何切る</title>
    <style>
      html,
      body {
        margin: 0;
        font-family: "Hiragino Kaku Gothic ProN", "Yu Gothic", "Meiryo", system-ui, sans-serif;
      }
      /* iframe全体の裏地も緑（フェルト卓の縁） */
      html,
      body {
        background: #0c5836;
      }
      /* 麻雀卓っぽい緑フェルト背景 */
      #app {
        padding: 18px 16px 20px;
        background: radial-gradient(120% 140% at 50% 0%, #1f8f5b 0%, #136e44 55%, #0c5836 100%);
        border-radius: 14px;
        box-shadow:
          inset 0 0 0 6px rgba(0, 0, 0, 0.18),
          inset 0 0 40px rgba(0, 0, 0, 0.22);
        color: #eafff3;
      }
      .label {
        font-size: 13px;
        color: rgba(234, 255, 243, 0.8);
        margin: 12px 2px 6px;
      }
      .hand {
        display: flex;
        flex-wrap: nowrap;
        gap: 2px;
        align-items: flex-end;
        padding: 10px;
        border-radius: 10px;
        background: rgba(0, 0, 0, 0.12);
      }
      /* 14枚が必ず一列に収まるよう、等分割でコンテナ幅に合わせて縮む */
      .hand .t {
        flex: 1 1 0;
        min-width: 0;
        max-width: 40px;
        opacity: 0;
        transform: translateY(7px);
        transition:
          opacity 0.28s ease,
          transform 0.28s ease;
      }
      /* 段階描画: .show が付いた牌だけ現れる */
      .hand .t.show {
        opacity: 1;
        transform: none;
      }
      .hand .t svg {
        width: 100%;
        height: auto;
        display: block;
        filter: drop-shadow(0 2px 3px rgba(0, 0, 0, 0.35));
        border-radius: 4px;
      }
      /* 推奨打牌は手牌を出し切ってからフェードイン */
      .reco-wrap {
        opacity: 0;
        transform: translateY(8px);
        transition:
          opacity 0.35s ease,
          transform 0.35s ease;
      }
      .reco-wrap.show {
        opacity: 1;
        transform: none;
      }
      .recos {
        display: flex;
        flex-wrap: wrap;
        gap: 14px;
        margin-top: 4px;
      }
      .reco {
        text-align: center;
      }
      .reco svg {
        height: 52px;
        width: auto;
        display: block;
        margin: 0 auto;
        filter: drop-shadow(0 2px 3px rgba(0, 0, 0, 0.35));
        border-radius: 5px;
      }
      .reco .u {
        font-size: 12px;
        color: rgba(234, 255, 243, 0.9);
        margin-top: 4px;
      }
      .meta {
        font-size: 16px;
        font-weight: 600;
        margin: 4px 2px;
        color: #ffffff;
      }
      /* 操作ボタン（ツモ / リセット） */
      .controls {
        display: flex;
        align-items: center;
        flex-wrap: wrap;
        gap: 10px;
        margin: 14px 2px 2px;
      }
      .controls button {
        font: inherit;
        font-weight: 700;
        cursor: pointer;
        border: none;
        border-radius: 9px;
        padding: 9px 16px;
        transition:
          transform 0.06s ease,
          opacity 0.2s ease;
      }
      .controls button:active {
        transform: scale(0.96);
      }
      .controls button:disabled {
        opacity: 0.55;
        cursor: default;
      }
      .controls button.draw {
        background: #ffd23f;
        color: #3a2c00;
        box-shadow: 0 2px 0 #c9a419;
      }
      .controls button.reset {
        background: rgba(255, 255, 255, 0.14);
        color: #eafff3;
        box-shadow: inset 0 0 0 1px rgba(234, 255, 243, 0.4);
      }
      .wallinfo {
        font-size: 13px;
        color: rgba(234, 255, 243, 0.85);
      }
      .wallinfo b {
        color: #fff;
      }
      /* 打牌フェーズ: 手牌をクリックで捨てられる */
      .hand .t.clickable {
        cursor: pointer;
      }
      .hand .t.clickable:hover {
        transform: translateY(-7px);
      }
      /* ツモってきた牌: 少し離して黄色でハイライト */
      .hand .gap {
        flex: 0 0 14px;
        min-width: 14px;
      }
      .hand .t.drawn svg {
        outline: 3px solid #ffd23f;
        outline-offset: 1px;
        border-radius: 4px;
      }
      .hand .t.drawn {
        animation: drawpop 0.3s ease;
      }
      @keyframes drawpop {
        from {
          transform: translateY(-10px);
          opacity: 0;
        }
        to {
          transform: none;
          opacity: 1;
        }
      }
      /* 河（捨て牌）*/
      .river {
        display: flex;
        flex-wrap: wrap;
        gap: 2px;
        padding: 8px;
        border-radius: 8px;
        background: rgba(0, 0, 0, 0.1);
      }
      .river .dt {
        flex: 0 0 auto;
        width: 22px;
      }
      .river .dt svg {
        width: 100%;
        height: auto;
        display: block;
        border-radius: 3px;
        opacity: 0.9;
      }
      .warn {
        font-size: 12px;
        color: #ffd6d2;
        margin: 6px 2px;
      }
      .loading {
        display: flex;
        align-items: center;
        gap: 10px;
        min-height: 90px;
        font-size: 14px;
        color: rgba(234, 255, 243, 0.85);
      }
      .loading .spin {
        width: 18px;
        height: 18px;
        border-radius: 50%;
        border: 3px solid rgba(234, 255, 243, 0.3);
        border-top-color: #eafff3;
        animation: spin 0.8s linear infinite;
      }
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
    </style>
  </head>
  <body>
    <div id="app">
      <div class="loading"><span class="spin"></span>読み込み中…</div>
    </div>
    <script type="module" src="./hand.tsx"></script>
  </body>
</html>
