<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    />
    <style>
      html, body { margin: 0; font-family: system-ui, sans-serif; }
      #map { height: 320px; width: 100%; border-radius: 12px; }
      #title { padding: 8px 4px; font-weight: 600; }
      #note { padding: 0 4px 8px; color: #555; font-size: 13px; }
    </style>
  </head>
  <body>
    <div id="title">読み込み中…</div>
    <div id="map"></div>
    <div id="note"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
      // --- MCP Apps の肝：ホスト(Claudeなど)から postMessage でデータが届く ---
      // ツールが返した structuredContent が、この iframe に渡ってくる。
      function render(spot) {
        if (!spot || typeof spot.lat !== "number") return;
        document.getElementById("title").textContent = spot.name;
        document.getElementById("note").textContent = spot.note || "";

        const map = L.map("map").setView([spot.lat, spot.lng], 14);
        L.tileLayer("https://tile.openstreetmap.org/{z}/{x}/{y}.png", {
          attribution: "© OpenStreetMap",
        }).addTo(map);
        L.marker([spot.lat, spot.lng])
          .addTo(map)
          .bindPopup(spot.name)
          .openPopup();
        setTimeout(() => map.invalidateSize(), 0);
      }

      // クライアントによってデータの渡し方が異なるため両対応にしておく
      // (1) window.openai?.toolOutput  … OpenAI Apps SDK 形式
      // (2) postMessage(event.data)    … 汎用形式
      window.addEventListener("message", (e) => {
        const data = e.data?.toolOutput ?? e.data?.structuredContent ?? e.data;
        render(data);
      });

      if (window.openai && window.openai.toolOutput) {
        render(window.openai.toolOutput);
      }
    </script>
  </body>
</html>
