<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="light dark" />
    <title>何切る</title>
    <style>
      html, body { margin: 0; font-family: "Hiragino Kaku Gothic ProN","Yu Gothic","Meiryo",system-ui,sans-serif; }
      /* iframe全体の裏地も緑（フェルト卓の縁） */
      html, body { background: #0c5836; }
      /* 麻雀卓っぽい緑フェルト背景 */
      #app {
        padding: 18px 16px 20px;
        background: radial-gradient(120% 140% at 50% 0%, #1f8f5b 0%, #136e44 55%, #0c5836 100%);
        border-radius: 14px;
        box-shadow: inset 0 0 0 6px rgba(0,0,0,0.18), inset 0 0 40px rgba(0,0,0,0.22);
        color: #eafff3;
      }
      .label { font-size: 13px; color: rgba(234,255,243,0.8); margin: 12px 2px 6px; }
      .hand {
        display: flex; flex-wrap: wrap; gap: 3px; align-items: flex-end;
        padding: 10px; border-radius: 10px; background: rgba(0,0,0,0.12);
      }
      .hand .t svg { height: 70px; width: auto; display: block;
        filter: drop-shadow(0 2px 3px rgba(0,0,0,0.35)); border-radius: 6px; }
      .recos { display: flex; flex-wrap: wrap; gap: 14px; margin-top: 4px; }
      .reco { text-align: center; }
      .reco svg { height: 52px; width: auto; display: block; margin: 0 auto;
        filter: drop-shadow(0 2px 3px rgba(0,0,0,0.35)); border-radius: 5px; }
      .reco .u { font-size: 12px; color: rgba(234,255,243,0.9); margin-top: 4px; }
      .meta { font-size: 16px; font-weight: 600; margin: 4px 2px; color: #ffffff; }
      .warn { font-size: 12px; color: #ffd6d2; margin: 6px 2px; }
    </style>
  </head>
  <body>
    <div id="app">読み込み中…</div>
    <script type="module" src="./hand.ts"></script>
  </body>
</html>
